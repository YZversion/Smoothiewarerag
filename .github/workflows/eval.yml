# Phase 7 — 检索回归 CI
# Gate: mean coverage@5 >= 70% (03_search.EVAL_COV5_GATE)
# data/ 与 repos/ 不入库 → CI 内 shallow clone + 重建索引

name: Eval

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tier:
        description: "Eval tier: lexical or full"
        required: false
        default: "lexical"

defaults:
  run:
    working-directory: industrial-cpp-kb-lab

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI_EVAL_TIER: ${{ github.event.inputs.tier || 'lexical' }}

    steps:
      - name: Checkout lab
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: industrial-cpp-kb-lab/requirements.txt

      - name: Install system tools (ripgrep + ctags)
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep universal-ctags
          rg --version
          ctags --version

      - name: Clone Smoothieware (shallow)
        run: |
          mkdir -p repos
          git clone --depth 1 https://github.com/Smoothieware/Smoothieware.git repos/Smoothieware

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build index pipeline
        run: |
          python src/01_scan_files.py
          python src/02_extract_symbols.py
          python src/03_build_chunks.py
          python src/05_extract_dispatch_index.py
          python src/03_build_callgraph.py

      - name: Configure eval tier and gates
        run: |
          if [ "${CI_EVAL_TIER}" = "full" ]; then
            echo "KB_DISABLE_DENSE=0" >> "$GITHUB_ENV"
            echo "KB_EVAL_COV5_GATE=0.78" >> "$GITHUB_ENV"
            echo "[CONFIG] tier=full-tier dense=on gate_cov5=78%"
          else
            echo "KB_DISABLE_DENSE=1" >> "$GITHUB_ENV"
            echo "KB_EVAL_COV5_GATE=0.72" >> "$GITHUB_ENV"
            echo "[CONFIG] tier=lexical-tier dense=off gate_cov5=72%"
          fi

      - name: Cache HF model (full-tier only)
        if: env.CI_EVAL_TIER == 'full'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-bge-m3-v1

      - name: Build dense index (full-tier only)
        if: env.CI_EVAL_TIER == 'full'
        run: python scripts/build_dense_index.py

      - name: Retrieval eval (tier gate)
        run: python src/03_search.py --eval

      - name: Regression (skip LLM — no API key in CI)
        run: python src/run_regression.py --skip-llm --top-k 8
