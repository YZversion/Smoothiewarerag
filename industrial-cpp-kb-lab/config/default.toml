# kb 默认配置文件
# 优先级：命令行 flags > 环境变量 > 本文件
# 环境变量名称：REPO_ROOT / LLM_PROVIDER / LLM_MODEL 等（见 .env.example）

[index]
# 源码仓库根目录（供 kb index build 使用）
repo_root = "./repos/Smoothieware"
# 数据产物输出目录
out = "./data"

[llm]
# LLM 提供商（zhipu / openai / deepseek / ollama）
provider = "zhipu"
# 模型名；留空则由 provider 的默认值决定
model = ""
# 单次请求超时（秒）
timeout_s = 180
# 最大重试次数
max_retries = 5

[search]
# 默认检索返回数量
top_k = 8
# 是否启用 repomap PageRank（Phase 9 实验；建议保持 false）
enable_reporank = false

[serve]
# kb serve 默认端口
port = 8080
